name: SignalDrop
options:
  bundleIdPrefix: com.scottkostolni
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "27.0"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 5N69HV7X7S
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  SignalDrop:
    type: application
    platform: macOS
    sources:
      - path: SignalDrop/Sources
      - path: SignalDrop/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scottkostolni.SignalDrop
        INFOPLIST_FILE: SignalDrop/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SignalDrop/Resources/SignalDrop.entitlements
        PRODUCT_NAME: SignalDrop
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: SignalDrop/Resources/SignalDrop.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  SignalDropTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SignalDropTests
    dependencies:
      - target: SignalDrop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scottkostolni.SignalDropTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SignalDrop.app/Contents/MacOS/SignalDrop"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true
