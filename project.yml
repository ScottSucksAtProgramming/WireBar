name: WireBar
options:
  bundleIdPrefix: com.scottkostolni
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "27.0"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 5N69HV7X7S
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  WireBar:
    type: application
    platform: macOS
    sources:
      - path: WireBar/Sources
      - path: WireBar/Resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scottkostolni.WireBar
        INFOPLIST_FILE: WireBar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: WireBar/Resources/WireBar.entitlements
        PRODUCT_NAME: WireBar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: WireBar/Resources/WireBar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  WireBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WireBarTests
    dependencies:
      - target: WireBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scottkostolni.WireBarTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WireBar.app/Contents/MacOS/WireBar"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true
